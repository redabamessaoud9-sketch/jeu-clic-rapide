<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Clic Rapide</title>
    <style>
        /* Arrière-plan global avec un dégradé coloré */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            color: #333;
        }

        /* Conteneur principal avec effet "verre" (Glassmorphism) */
        #game-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }

        h1 { margin-top: 0; color: #2c3e50; }
        
        .stats { font-size: 22px; margin: 15px 0; font-weight: bold; }
        .high-score { color: #e74c3c; /* Rouge pour mettre en évidence le record */ }
        
        /* Bouton de clic stylisé avec animation au clic */
        #click-btn {
            padding: 25px 40px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px #2980b9;
            transition: transform 0.1s, box-shadow 0.1s;
            margin: 20px 0;
            user-select: none; /* Empêche la sélection du texte en cliquant vite */
            width: 100%;
        }

        #click-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px #2980b9;
        }

        #click-btn:disabled {
            background-color: #bdc3c7;
            box-shadow: 0 6px #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        #reset-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background-color 0.3s;
        }

        #reset-btn:hover { background-color: #27ae60; }
    </style>
</head>
<body>

    <div id="game-container">
        <h1>Test de Clic Rapide</h1>
        <div class="stats high-score">Meilleur Score : <span id="high-score">0</span></div>
        <div class="stats">Temps restant : <span id="time">30</span>s</div>
        <div class="stats">Score Actuel : <span id="score">0</span></div>

        <div id="game-area">
            <button id="click-btn" onclick="handleClick()">CLIQUEZ ICI !</button>
            <br><br>
            <button id="reset-btn" onclick="resetGame()">Réinitialiser</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let timer;
        
        // Récupérer le meilleur score sauvegardé dans le navigateur, ou 0 s'il n'y en a pas
        let highScore = localStorage.getItem('clicRapideHighScore') || 0;
        document.getElementById('high-score').innerText = highScore;

        function handleClick() {
            // Démarre le chronomètre au tout premier clic
            if (!gameActive && timeLeft > 0) {
                gameActive = true;
                startTimer();
            }
            // Incrémente le score si le jeu est actif
            if (gameActive) {
                score++;
                document.getElementById('score').innerText = score;
            }
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    gameActive = false;
                    document.getElementById('click-btn').disabled = true;
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            let message = "Temps écoulé ! Votre score est de : " + score + " clics.\n";
            
            // Vérifie si le joueur a battu son record
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('clicRapideHighScore', highScore); // Sauvegarde le nouveau record
                document.getElementById('high-score').innerText = highScore;
                message += "🎉 INCROYABLE ! NOUVEAU RECORD ! 🎉";
            } else {
                message += "Le record à battre est de " + highScore + ".";
            }
            
            // Petit délai pour laisser l'interface se figer avant l'alerte
            setTimeout(() => alert(message), 10);
        }

        function resetGame() {
            clearInterval(timer);
            score = 0;
            timeLeft = 30;
            gameActive = false;
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
            document.getElementById('click-btn').disabled = false;
        }
    </script>
</body>
</html>
