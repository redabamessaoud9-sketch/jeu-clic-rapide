<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Clic Rapide</title>
    <style>
        /* Arrière-plan global */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            color: #333;
        }

        /* Conteneur principal */
        #game-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
        }

        h1 { margin-top: 0; color: #2c3e50; }
        p { color: #555; font-size: 18px; }
        
        .stats { font-size: 22px; margin: 15px 0; font-weight: bold; }
        .high-score { color: #e74c3c; font-size: 26px; margin-bottom: 25px; }
        
        /* Boutons */
        button {
            font-family: inherit;
            transition: transform 0.1s, background-color 0.3s, box-shadow 0.1s;
            user-select: none;
        }

        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #9b59b6;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px #8e44ad;
            margin-top: 10px;
        }

        #start-btn:active { transform: translateY(4px); box-shadow: 0 1px #8e44ad; }
        #start-btn:hover { background-color: #8e44ad; }

        #click-btn {
            padding: 25px 40px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 12px;
            box-shadow: 0 6px #2980b9;
            margin: 20px 0;
            width: 100%;
        }

        #click-btn:active { transform: translateY(4px); box-shadow: 0 2px #2980b9; }

        #click-btn:disabled {
            background-color: #bdc3c7;
            box-shadow: 0 6px #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
