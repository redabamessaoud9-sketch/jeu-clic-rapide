<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de Clic Rapide</title>
    <style>
        /* Arrière-plan global */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            color: #333;
            overflow: hidden; /* Empêche le défilement accidentel en cliquant vite */
        }

        /* Conteneur du menu (Glassmorphism) */
        #menu-screen {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 90%;
            z-index: 10;
        }

        h1 { margin-top: 0; color: #2c3e50; }
        p { color: #555; font-size: 18px; }
        
        .high-score { color: #e74c3c; font-size: 26px; margin: 25px 0; font-weight: bold; }
        
        /* Bouton pour démarrer */
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #9b59b6;
            color: white;
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px #8e44ad;
            transition: transform 0.1s, background-color 0.3s;
        }
        #start-btn:active { transform: translateY(4px); box-shadow: 0 1px #8e44ad; }
        #start-btn:hover { background-color: #8e44ad; }

        /* ÉCRAN DE JEU FULL SCREEN */
        #game-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw;
            height: 100vh;
            cursor: crosshair; /* Curseur cible pour montrer qu'on peut cliquer */
            z-index: 5;
        }

        /* Zone de texte au centre de l'écran pendant le jeu */
        #game-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: white;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            pointer-events: none; /* TRÈS IMPORTANT : Les clics traversent le texte */
            width: 100%;
        }

        #score-display { font-size: 80px; color: #fff; margin-top: 10px; }
        #instruction { font-size: 30px; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.6; transform: scale(0.95); }
        }

        /* Bouton Quitter (en haut à droite) */
        #quit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px #c0392b;
            z-index: 20; /* Au-dessus de la zone cliquable */
        }
        #quit-btn:active { transform: translateY(2px); box-shadow: 0 2px #c0392b; }
    </style>
</head>
<body>

    <div id="menu-screen">
        <h1>Test de Clic Rapide</h1>
        <p>Avez-vous les doigts les plus rapides ? Vous avez 30 secondes.</p>
        <div class="high-score">🏆 Meilleur Score : <br><span id="menu-high-score" style="font-size: 40px;">0</span></div>
        <button id="start-btn" onclick="showGameScreen()">Commencer à jouer</button>
    </div>

    <div id="game-screen" onmousedown="handleClick(event)" ontouchstart="handleClick(event)">
        
        <button id="quit-btn" onclick="returnToMenu(event)">Quitter</button>

        <div id="game-info">
            <div id="instruction">CLIQUEZ N'IMPORTE OÙ POUR DÉMARRER</div>
            
            <div id="live-stats" style="display: none;">
                <div>Temps : <span id="time">30</span>s</div>
                <div id="score-display">0</div>
            </div>
        </div>

    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let gameActive = false;
        let timer;
        
        // Récupérer le meilleur score
        let highScore = localStorage.getItem('clicRapideHighScore') || 0;
        document.getElementById('menu-high-score').innerText = highScore;

        // Affiche l'écran de jeu (plein écran)
        function showGameScreen() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            resetGameVariables();
        }

        // Retourne au menu
        function returnToMenu(event) {
            // Empêche le clic sur "Quitter" d'être compté comme un clic de jeu
            if(event) event.stopPropagation(); 
            
            clearInterval(timer);
            gameActive = false;
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('menu-high-score').innerText = highScore;
        }

        // Gère les clics n'importe où sur l'écran
        function handleClick(event) {
            // Ignore les clics si la cible est le bouton "Quitter"
            if (event.target.id === 'quit-btn') return;

            // Démarre le jeu au premier clic
            if (!gameActive && timeLeft > 0) {
                gameActive = true;
                document.getElementById('instruction').style.display = 'none';
                document.getElementById('live-stats').style.display = 'block';
                startTimer();
            }

            // Incrémente le score
            if (gameActive) {
                score++;
                document.getElementById('score-display').innerText = score;
            }
        }

        function startTimer() {
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    gameActive = false;
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            let message = "Temps écoulé ! Votre score est de : " + score + " clics.\n";
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('clicRapideHighScore', highScore);
                message += "🎉 INCROYABLE ! NOUVEAU RECORD ! 🎉";
            } else {
                message += "Le record à battre est de " + highScore + ".";
            }
            
            setTimeout(() => {
                alert(message);
                returnToMenu(); 
            }, 50); // Léger délai pour que le dernier clic s'affiche
        }

        function resetGameVariables() {
            clearInterval(timer);
            score = 0;
            timeLeft = 30;
            gameActive = false;
            
            // Remet l'interface à zéro
            document.getElementById('score-display').innerText = score;
            document.getElementById('time').innerText = timeLeft;
            document.getElementById('instruction').style.display = 'block';
            document.getElementById('live-stats').style.display = 'none';
        }
    </script>
</body>
</html>
